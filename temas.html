<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Temas de Bordado | Atelier Sheila Amorim</title>
    <meta name="description" content="Escolha entre dezenas de temas de bordado para o enxoval do bebê: safari, ursos, fazendinha, fundo do mar, florais e muito mais. Atelier Sheila Amorim.">
    <link rel="canonical" href="https://ateliersheilaamorim.com.br/temas.html">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="pt_BR">
    <meta property="og:site_name" content="Atelier Sheila Amorim">
    <meta property="og:title" content="Galeria de Temas de Bordado | Atelier Sheila Amorim">
    <meta property="og:description" content="Dezenas de temas de bordado para personalizar o enxoval do bebê. Escolha o desenho e monte seu pedido.">
    <meta property="og:url" content="https://ateliersheilaamorim.com.br/temas.html">
    <meta property="og:image" content="https://ateliersheilaamorim.com.br/img/CAT-ACESSORIOS.jpeg">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #faf9f6; scroll-behavior: smooth; }

        .barra-tema-topo {
            position: sticky; top: 0;
            background: linear-gradient(90deg, #E8B41B 0%, #d9a418 100%);
            color: white; padding: 12px 20px; text-align: center;
            font-size: 0.95rem; z-index: 150;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
            display: none; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap;
        }
        .barra-tema-topo strong {
            background: rgba(255,255,255,0.25); padding: 2px 10px; border-radius: 12px;
        }

        .header-temas { text-align: center; padding: 20px; background: white; }

        .tabs-container {
            position: sticky; top: 0; background: #faf9f6;
            padding: 15px 0; z-index: 100;
            box-shadow: 0 5px 10px rgba(0,0,0,0.05); border-bottom: 1px solid #ddd;
        }
        .tabs {
            display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
            max-width: 1000px; margin: 0 auto; padding: 0 10px;
        }
        .tab-link {
            background-color: white; border: 1px solid #ccc; cursor: pointer;
            padding: 10px 20px; transition: 0.3s; font-size: 0.9rem; border-radius: 20px;
            color: #555; font-family: 'Lato', sans-serif; text-transform: uppercase; font-weight: bold;
        }
        .tab-link:hover { background-color: #eee; }
        .tab-link.active {
            background-color: #E8B41B; color: white; border-color: #E8B41B;
            transform: scale(1.05); box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .tab-content { display: none; padding: 20px; animation: fadeEffect 0.5s; }
        @keyframes fadeEffect { from { opacity: 0; } to { opacity: 1; } }

        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px; max-width: 1200px; margin: 0 auto; padding-bottom: 80px;
        }
        .card {
            background: white; border-radius: 8px; padding: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center;
        }
        .card img { width: 100%; height: 140px; object-fit: contain; border-radius: 5px; margin-bottom: 8px; }
        .card p { font-size: 0.85rem; font-weight: bold; color: #666; margin-bottom: 8px; }
        .card button { width: 100%; padding: 6px; font-size: 0.85rem; }

        .menu-modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .btn-modal-cat {
            background: #f0f0f0; border: 1px solid #ddd; padding: 10px;
            border-radius: 8px; color: #555; font-weight: bold; cursor: pointer;
            transition: 0.2s; text-transform: uppercase; font-size: 0.8rem;
        }
        .btn-modal-cat:hover { background: #E8B41B; color: white; border-color: #E8B41B; }
        .btn-finalizar-big {
            background: #25D366; color: white; width: 100%; padding: 15px;
            border: none; border-radius: 50px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 10px rgba(37,211,102,0.3);
        }

        #btn-topo {
            display: none; position: fixed; bottom: 90px; right: 20px; z-index: 99;
            border: none; outline: none; background-color: #E8B41B; color: white;
            cursor: pointer; padding: 12px; border-radius: 50%; font-size: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); opacity: 0.8; transition: 0.3s;
        }
        #btn-topo:hover { opacity: 1; transform: scale(1.1); }

        @media (max-width: 768px) {
            .tabs-container { position: relative !important; top: auto; padding: 10px 0; }
            .tab-link { padding: 8px 12px; font-size: 0.75rem; }
            .tabs { gap: 6px; }
            .header-temas h2 { font-size: 2rem; }
        }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MPB5QZX4X9"></script>
</head>
<body>

    <button onclick="subirTopo()" id="btn-topo" title="Voltar ao Menu">
        <i class="fas fa-arrow-up"></i>
    </button>

    <div id="barra-tema-topo" class="barra-tema-topo">
        <i class="fas fa-palette"></i> Escolhendo tema para: <strong>—</strong>
    </div>

    <div class="header-temas">
        <a href="index.html" style="color: #666; text-decoration: none; font-weight: bold;">⬅ Voltar ao Início</a>
        <h2 style="font-family: 'Great Vibes'; font-size: 2.5rem; color: #E8B41B; margin: 5px 0;">Galeria de Temas</h2>
    </div>

    <div class="tabs-container">
        <div class="tabs" id="tabs"></div>
    </div>

    <div id="conteudo-temas"></div>

    <!-- Modal de sucesso após seleção de tema -->
    <div id="modal-sucesso" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="text-align: center; max-width: 450px;">
            <i class="fas fa-check-circle" style="color: #25D366; font-size: 3rem; margin-bottom: 10px;"></i>
            <h3 style="color:#4A4A4A; font-family:'Great Vibes'; font-size:2rem; margin:0;">Item Adicionado!</h3>
            <p style="color:#666; font-size: 0.9rem;">Escolha a próxima categoria ou finalize:</p>
            <div class="menu-modal-grid">
                <button class="btn-modal-cat" onclick="window.location.href='paginas-produtos/fraldas.html'">👶 Fraldas</button>
                <button class="btn-modal-cat" onclick="window.location.href='paginas-produtos/banho.html'">🛁 Hora do Banho</button>
                <button class="btn-modal-cat" onclick="window.location.href='paginas-produtos/soninho.html'">💤 Hora da Soneca</button>
                <button class="btn-modal-cat" onclick="window.location.href='paginas-produtos/acessorios.html'">🎀 Acessórios</button>
                <button class="btn-modal-cat" onclick="window.location.href='paginas-produtos/escolar.html'">🎒 Volta às Aulas</button>
                <button class="btn-modal-cat" onclick="window.location.href='paginas-produtos/organizacao.html'">🛡️ Organização</button>
            </div>
            <button onclick="finalizarCompraZap()" class="btn-finalizar-big" style="margin-top: 15px;">
                <i class="fab fa-whatsapp"></i> Finalizar Pedido
            </button>
            <p style="margin-top:15px; font-size:0.8rem; color:#999; cursor:pointer; text-decoration:underline;" onclick="fecharModalSucesso()">
                Apenas fechar e continuar vendo temas
            </p>
        </div>
    </div>

    <!-- Barra flutuante -->
    <div class="floating-bar">
        <div class="btn-trash" onclick="limparSacola()" title="Esvaziar Lista">
            <i class="fas fa-trash-alt"></i>
        </div>
        <div class="sacola-float" onclick="finalizarCompraZap()">
            <i class="fab fa-whatsapp"></i>
            <span>Minha Lista</span>
            <div class="contador">0</div>
        </div>
    </div>

    <script src="js/dados-temas.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
